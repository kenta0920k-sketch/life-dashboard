<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>けんたの人生ダッシュボード</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#1e293b;
border-radius:20px;
padding:20px;
margin-bottom:15px;
}

h1{
text-align:center;
margin-bottom:20px;
}

h2{
margin-bottom:15px;
}

.percent{
font-size:48px;
font-weight:bold;
text-align:center;
}

.label{
text-align:center;
opacity:0.8;
margin-bottom:15px;
}

.progress{
width:100%;
height:20px;
background:#334155;
border-radius:999px;
overflow:hidden;
}

.progress-bar{
height:100%;
background:#22c55e;
width:0%;
transition:.5s;
}

.stat{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.check-item{
display:flex;
align-items:center;
gap:10px;
margin:12px 0;
}

input[type="checkbox"]{
width:22px;
height:22px;
}

input[type="text"]{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
}

button{
cursor:pointer;
}

.add-btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:16px;
}

.delete-btn{
border:none;
background:#ef4444;
color:white;
padding:6px 10px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>人生ダッシュボード</h1>

<div class="card">

<div class="percent" id="percent">0%</div>

<div class="label">
60歳までの人生進捗
</div>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

</div>

<div class="card">

<div class="stat">
<span>現在年齢</span>
<span id="age"></span>
</div>

<div class="stat">
<span>経過日数</span>
<span id="elapsed"></span>
</div>

<div class="stat">
<span>残り日数</span>
<span id="remaining"></span>
</div>

</div>

<div class="card">

<h2>今日の習慣</h2>

<div id="habitList"></div>

<input
id="newHabit"
type="text"
placeholder="新しい習慣を入力"
>

<button
class="add-btn"
onclick="addHabit()"
>
＋習慣を追加
</button>

</div>

</div>

<script>

const birth = new Date("2002-09-20");
const target = new Date("2062-09-20");

function updateDashboard(){

const now = new Date();

const totalLife = target - birth;
const lived = now - birth;

const percent =
(lived / totalLife) * 100;

document.getElementById("percent").textContent =
percent.toFixed(2) + "%";

document.getElementById("bar").style.width =
percent + "%";

const age =
((now - birth) /
(365.2425*24*60*60*1000));

document.getElementById("age").textContent =
age.toFixed(2) + "歳";

const elapsedDays =
Math.floor(
lived /
(1000*60*60*24)
);

document.getElementById("elapsed").textContent =
elapsedDays.toLocaleString() + "日";

const remainingDays =
Math.floor(
(target-now) /
(1000*60*60*24)
);

document.getElementById("remaining").textContent =
remainingDays.toLocaleString() + "日";

}

updateDashboard();

// 日付が変わったらチェックをリセット
const today =
new Date().toISOString().split("T")[0];

const lastReset =
localStorage.getItem("lastResetDate");

if(lastReset !== today){

Object.keys(localStorage).forEach(key => {

if(key.startsWith("habit_check_")){

localStorage.removeItem(key);

}

});

localStorage.setItem(
"lastResetDate",
today
);

}

let habits =
JSON.parse(
localStorage.getItem("habits")
) || [
"読書30分",
"ストレッチ",
"背中呼吸",
"自炊",
"施工管理勉強"
];

function saveHabits(){

localStorage.setItem(
"habits",
JSON.stringify(habits)
);

}

function renderHabits(){

const habitList =
document.getElementById("habitList");

habitList.innerHTML = "";

habits.forEach((habit,index)=>{

const checked =
localStorage.getItem(
"habit_check_"+index
) === "true";

const div =
document.createElement("div");

div.className = "check-item";

div.innerHTML = `
<input type="checkbox"
${checked ? "checked" : ""}
onchange="
localStorage.setItem(
'habit_check_${index}',
this.checked
)
">

<span style="flex:1;">
${habit}
</span>

<button
onclick="moveUp(${index})"
style="
border:none;
background:#3b82f6;
color:white;
padding:6px 8px;
border-radius:8px;
">
↑
</button>

<button
onclick="moveDown(${index})"
style="
border:none;
background:#3b82f6;
color:white;
padding:6px 8px;
border-radius:8px;
">
↓
</button>

<button
class="delete-btn"
onclick="deleteHabit(${index})"
>
削除
</button>
`;

habitList.appendChild(div);

});

}

function addHabit(){

const input =
document.getElementById("newHabit");

const value =
input.value.trim();

if(!value) return;

habits.push(value);

saveHabits();

input.value = "";
// 日付が変わったらチェックをリセット


renderHabits();

}

function moveUp(index){

if(index === 0) return;

[habits[index], habits[index - 1]] =
[habits[index - 1], habits[index]];

saveHabits();

renderHabits();

}

function moveDown(index){

if(index === habits.length - 1) return;

[habits[index], habits[index + 1]] =
[habits[index + 1], habits[index]];

saveHabits();

renderHabits();

}

function deleteHabit(index){

if(!confirm("削除しますか？"))
return;

habits.splice(index,1);

saveHabits();

renderHabits();

}
renderHabits();
  

</script>

</body>
</html>
